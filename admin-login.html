<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель - ТЕПЛОСИЛА</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #1E3A5F 0%, #0D2137 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo { margin-bottom: 30px; }
        .login-logo i { font-size: 50px; color: #1E3A5F; }
        .login-logo h2 { color: #1E3A5F; margin-top: 15px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            border: 2px solid #e5e7eb; border-radius: 12px;
            font-size: 16px; transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none; border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #1E3A5F, #3B82F6);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(30,58,95,0.3);
        }
        .error-message {
            background: #fee2e2; color: #dc2626;
            padding: 12px; border-radius: 10px;
            margin-bottom: 20px; display: none;
        }
        .back-link { margin-top: 20px; }
        .back-link a { color: #3B82F6; text-decoration: none; }
        .hint { margin-top: 20px; padding-top: 15px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-fire"></i>
            <h2>ТЕПЛОСИЛА</h2>
            <p>Вход в админ-панель</p>
        </div>
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText">Неверный пароль</span>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Пароль</label>
                <input type="password" id="adminPassword" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Вернуться на сайт</a>
        </div>
        <div class="hint">
            <p>🔑 Пароль: <strong>########</strong></p>
        </div>
    </div>
    <script>
        const API_URL = 'http://localhost:3000/api';
        
        (function() {
            const session = localStorage.getItem('teplosilaAdmin');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (data.expires > Date.now()) {
                        window.location.href = 'admin-panel.html';
                    }
                } catch(e) {}
            }
        })();
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMessage');
            const password = document.getElementById('adminPassword').value;
            
            errorDiv.style.display = 'none';
            
            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                if (res.ok) {
                    localStorage.setItem('teplosilaAdmin', JSON.stringify({
                        expires: Date.now() + 24 * 60 * 60 * 1000
                    }));
                    window.location.href = 'admin-panel.html';
                } else {
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                if (password === 'admin123') {
                    localStorage.setItem('teplosilaAdmin', JSON.stringify({
                        expires: Date.now() + 24 * 60 * 60 * 1000
                    }));
                    window.location.href = 'admin-panel.html';
                } else {
                    errorDiv.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
